name: Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref to deploy'
        required: false
        default: 'main'
      pr_number:
        description: 'PR number to merge after tests pass'
        required: false
        default: ''
      orchestrator_issue:
        description: 'Orchestrator issue number'
        required: false
        default: ''

concurrency:
  group: deploy-api-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore StrataReports.Functions.csproj

      - name: Build
        run: dotnet build StrataReports.Functions.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish StrataReports.Functions.csproj --configuration Release --output ./publish --no-build

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure PostgreSQL allows Azure services
        run: |
          az postgres flexible-server firewall-rule create \
            --resource-group rg-strata-reports-dev \
            --name psql-strata-reports-dev \
            --rule-name AllowAllAzureServices \
            --start-ip-address 0.0.0.0 \
            --end-ip-address 0.0.0.0 2>&1 || true
          echo "Firewall rule ensured."

      - name: Deploy to Azure Function App
        run: |
          cd publish
          zip -r ../deploy.zip . -x "*.git*"
          cd ..
          az functionapp deployment source config-zip \
            --resource-group rg-strata-reports-dev \
            --name fn-strata-reports \
            --src deploy.zip

      - name: Configure app settings
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          POSTMARK_API_KEY: ${{ secrets.POSTMARK_API_KEY }}
          BLOB_CONNECTION_STRING: ${{ secrets.BLOB_CONNECTION_STRING }}
        run: |
          az functionapp config appsettings set \
            --resource-group rg-strata-reports-dev \
            --name fn-strata-reports \
            --settings \
            "ConnectionStrings__Database=Host=psql-strata-reports-dev.postgres.database.azure.com;Database=stratareports;Username=stratareportadmin;Password=${POSTGRES_ADMIN_PASSWORD};SSL Mode=Require" \
            "Anthropic__ApiKey=${ANTHROPIC_API_KEY}" \
            "JWT_SECRET=${JWT_SECRET}" \
            "Stripe__SecretKey=${STRIPE_SECRET_KEY}" \
            "Stripe__WebhookSecret=${STRIPE_WEBHOOK_SECRET}" \
            "Entra__ClientId=${ENTRA_CLIENT_ID}" \
            "Entra__TenantId=${ENTRA_TENANT_ID}" \
            "Postmark__ApiKey=${POSTMARK_API_KEY}" \
            "AzureWebJobsStorage=${BLOB_CONNECTION_STRING}"

      - name: Apply database migrations
        env:
          ConnectionStrings__Database: Host=psql-strata-reports-dev.postgres.database.azure.com;Database=stratareports;Username=stratareportadmin;Password=${{ secrets.POSTGRES_ADMIN_PASSWORD }};SSL Mode=Require
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          PGSSLMODE: require
        run: |
          sudo apt-get install -y postgresql-client -qq
          PGCONN="host=psql-strata-reports-dev.postgres.database.azure.com dbname=stratareports user=stratareportadmin sslmode=require"
          if PGPASSWORD="${PGPASSWORD}" psql "$PGCONN" -c '\d "Users"' >/dev/null 2>&1; then
            echo "Users table exists — migration history is valid"
          else
            echo "Users table missing — dropping migration history to force full replay"
            PGPASSWORD="${PGPASSWORD}" psql "$PGCONN" -c 'DROP TABLE IF EXISTS "__EFMigrationsHistory"' 2>/dev/null || true
          fi

          # Detect columns that are in migration history but not actually in the DB,
          # and remove their stale history entries so EF Core re-applies them.
          echo "=== Checking for stale migration history entries ==="
          MISSING_PENDING_EMAIL=$(PGPASSWORD="${PGPASSWORD}" psql "$PGCONN" -tAc \
            "SELECT COUNT(*) FROM information_schema.columns WHERE table_name='Users' AND column_name='PendingEmail'" 2>/dev/null || echo "0")
          if [ "${MISSING_PENDING_EMAIL:-0}" = "0" ]; then
            echo "PendingEmail column missing — removing stale migration history entry to force re-apply"
            PGPASSWORD="${PGPASSWORD}" psql "$PGCONN" -c \
              "DELETE FROM \"__EFMigrationsHistory\" WHERE \"MigrationId\" = '20260529190000_AddPendingEmailToAppUser'" 2>/dev/null || true
          else
            echo "PendingEmail column present — no remediation needed"
          fi

          dotnet tool install --global dotnet-ef
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update --project StrataReports.Functions.csproj --verbose

      - name: Restart Function App and verify DB connectivity
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          echo "Restarting Function App..."
          az functionapp restart --resource-group rg-strata-reports-dev --name fn-strata-reports
          echo "Waiting 30s for restart..."
          sleep 30

          echo "=== PostgreSQL firewall rules ==="
          az postgres flexible-server firewall-rule list --resource-group rg-strata-reports-dev --name psql-strata-reports-dev --output table

          echo "=== Function App outbound IPs ==="
          az functionapp show --resource-group rg-strata-reports-dev --name fn-strata-reports \
            --query "{outboundIps:outboundIpAddresses}" --output json

          echo "=== Testing auth endpoint ==="
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -m 15 -o /tmp/auth-test.txt -w "%{http_code}" \
              -X POST "https://fn-strata-reports.azurewebsites.net/api/auth/login" \
              -H "Content-Type: application/json" \
              -d '{"email":"deploy-test@example.com","password":"Test1234!"}')
            BODY=$(cat /tmp/auth-test.txt)
            echo "Attempt $i: HTTP $STATUS — $BODY"
            if [ "$STATUS" != "500" ]; then
              echo "Auth endpoint healthy (HTTP $STATUS)"
              break
            fi
            sleep 10
          done

          if [ "$STATUS" = "500" ]; then
            echo "ERROR: Auth still returning 500 after restart"
            echo "Adding Function App outbound IPs to PostgreSQL firewall..."
            OUTBOUND_IPS=$(az functionapp show --resource-group rg-strata-reports-dev --name fn-strata-reports \
              --query "outboundIpAddresses" -o tsv)
            echo "Outbound IPs: $OUTBOUND_IPS"
            IFS=',' read -ra IPS <<< "$OUTBOUND_IPS"
            for i in "${!IPS[@]}"; do
              IP="${IPS[$i]}"
              echo "Adding firewall rule for IP: $IP"
              az postgres flexible-server firewall-rule create \
                --resource-group rg-strata-reports-dev \
                --name psql-strata-reports-dev \
                --rule-name "FnApp-outbound-$i" \
                --start-ip-address "$IP" \
                --end-ip-address "$IP" 2>&1 || true
            done
            echo "Restarting again after adding IP rules..."
            az functionapp restart --resource-group rg-strata-reports-dev --name fn-strata-reports
            sleep 30
            STATUS2=$(curl -s -m 15 -o /tmp/auth-test2.txt -w "%{http_code}" \
              -X POST "https://fn-strata-reports.azurewebsites.net/api/auth/login" \
              -H "Content-Type: application/json" \
              -d '{"email":"deploy-test@example.com","password":"Test1234!"}')
            echo "After IP rules: HTTP $STATUS2 — $(cat /tmp/auth-test2.txt)"
          fi

      - name: Trigger test agent
        env:
          GH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_ORCHESTRATOR_ISSUE: ${{ inputs.orchestrator_issue }}
        run: |
          if [ -n "$INPUT_PR_NUMBER" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
            ORCHESTRATOR_ISSUE="$INPUT_ORCHESTRATOR_ISSUE"
            MERGE_AFTER_TEST="true"
          else
            PR_NUMBER=$(gh pr list --repo strata-reports-ai/fn-strata-reports \
              --base main --state merged --limit 5 \
              --json number,mergeCommit \
              --jq "[.[] | select(.mergeCommit.oid == \"${{ github.sha }}\")] | .[0].number // empty" \
              2>/dev/null || true)
            if [ -z "$PR_NUMBER" ]; then
              echo "No merged PR found for this push — skipping test agent"
              exit 0
            fi
            ORCHESTRATOR_ISSUE=$(gh pr view "$PR_NUMBER" --repo strata-reports-ai/fn-strata-reports \
              --json body --jq '.body' \
              | grep -oP 'orchestrator-strata-reports#\K[0-9]+' | head -1 || true)
            MERGE_AFTER_TEST="false"
          fi
          jq -n \
            --arg pr "$PR_NUMBER" \
            --arg issue "${ORCHESTRATOR_ISSUE:-}" \
            --arg merge "$MERGE_AFTER_TEST" \
            '{"ref":"main","inputs":{"pr_numbers":$pr,"target_repo":"fn-strata-reports","orchestrator_issues":$issue,"merge_after_test":$merge}}' | \
          gh api repos/strata-reports-ai/fn-strata-reports/actions/workflows/test-agent.yml/dispatches \
            --method POST --input -
          echo "Triggered test agent for PR #$PR_NUMBER (merge_after_test=$MERGE_AFTER_TEST)"