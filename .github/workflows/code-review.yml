name: "Code Review Agent"
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string
      head_branch:
        description: 'Head branch of the PR'
        required: true
        type: string
jobs:
  trigger-review:
    if: >-
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'feature/issue-')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Dispatch review to Claude Code Agent
        env:
          GH_TOKEN: ${{ github.token }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          HEAD_BRANCH: ${{ github.head_ref || github.event.inputs.head_branch }}
        run: bash scripts/trigger-review.sh
