name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Claude'
        required: true
        type: string
      branch:
        description: 'Branch to check out (default: main)'
        required: false
        default: 'main'
        type: string

jobs:
  # Triggered by @claude comments on issues and PRs
  claude-tag:
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore StrataReports.Functions.csproj

      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          timeout_minutes: 30

  # Triggered by workflow_dispatch (orchestrator or manual)
  claude-agent:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore StrataReports.Functions.csproj

      - id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@beta
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: ${{ github.event.inputs.prompt }}
          mode: agent
          model: claude-sonnet-4-6
          allowed_tools: Bash,Edit,MultiEdit,Glob,Grep,LS,Read,Write,TodoWrite
          timeout_minutes: 30
          max_turns: 50

      - name: Build (post-agent validation)
        if: steps.claude.outcome == 'success'
        id: validate
        run: dotnet build StrataReports.Functions.csproj --configuration Release --no-restore

      - name: Handle spending cap
        if: steps.claude.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          BRANCH: ${{ github.event.inputs.branch || 'main' }}
          PROMPT: ${{ github.event.inputs.prompt || '' }}
        run: |
          STEP_OUTPUT="${{ steps.claude.outputs.output }}"
          if echo "$PROMPT" | grep -qF "You are a code reviewer"; then
            echo "Code review agent failure — skipping retry logic"
            exit 0
          fi
          if ! echo "$STEP_OUTPUT" | grep -q "Spending cap reached resets"; then
            ISSUE_N=$(echo "$BRANCH" | grep -oP 'feature/issue-\K[0-9]+' || true)
            [ -z "$ISSUE_N" ] && ISSUE_N=$(echo "$PROMPT" | grep -oP 'Issue #\K[0-9]+' | head -1 || true)
            [ -z "$ISSUE_N" ] && ISSUE_N=$(echo "$PROMPT" | grep -oP 'orchestrator-strata-reports#\K[0-9]+' | head -1 || true)
            if [ -z "$ISSUE_N" ]; then exit 0; fi
            RETRY_COUNT=$(GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue view "$ISSUE_N" \
              --repo strata-reports-ai/orchestrator-strata-reports \
              --json labels --jq '[.labels[].name | select(startswith("retry-"))] | length' 2>/dev/null || echo "0")
            NEXT_RETRY=$(( ${RETRY_COUNT:-0} + 1 ))
            if [ "${RETRY_COUNT:-0}" -ge 3 ]; then
              GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue edit "$ISSUE_N" \
                --repo strata-reports-ai/orchestrator-strata-reports \
                --remove-label in-progress --add-label agent-failed
            else
              GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue edit "$ISSUE_N" \
                --repo strata-reports-ai/orchestrator-strata-reports \
                --remove-label in-progress --add-label ready --add-label "retry-$NEXT_RETRY"
            fi
            exit 1
          fi
          RESET_STR=$(echo "$STEP_OUTPUT" | grep -oP 'Spending cap reached resets \K[^\n]+' | head -1)
          RESET_ISO=""
          if [ -n "$RESET_STR" ]; then
            RESET_EPOCH=$(TZ=America/New_York date -d "$RESET_STR" +%s 2>/dev/null || echo "")
            if [ -n "$RESET_EPOCH" ]; then
              CURRENT=$(date +%s)
              [ "$RESET_EPOCH" -le "$CURRENT" ] && RESET_EPOCH=$(TZ=America/New_York date -d "tomorrow $RESET_STR" +%s 2>/dev/null || echo "")
              [ -n "$RESET_EPOCH" ] && RESET_ISO=$(date -u -d "@$RESET_EPOCH" +%Y-%m-%dT%H:%M:%SZ)
            fi
          fi
          [ -z "$RESET_ISO" ] && RESET_ISO=$(date -u -d "+8 hours" +%Y-%m-%dT%H:%M:%SZ)
          ISSUE_N=$(echo "$BRANCH" | grep -oP 'feature/issue-\K[0-9]+' || true)
          [ -z "$ISSUE_N" ] && ISSUE_N=$(echo "$PROMPT" | grep -oP 'Issue #\K[0-9]+' | head -1 || true)
          [ -z "$ISSUE_N" ] && ISSUE_N=$(echo "$PROMPT" | grep -oP 'orchestrator-strata-reports#\K[0-9]+' | head -1 || true)
          [ -z "$ISSUE_N" ] && exit 0
          GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue edit "$ISSUE_N" \
            --repo strata-reports-ai/orchestrator-strata-reports --add-label "cap-wait"
          GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue comment "$ISSUE_N" \
            --repo strata-reports-ai/orchestrator-strata-reports \
            --body "Spending cap reached. RESET_ISO: ${RESET_ISO}
          Will auto-resume after reset."
          echo "Marked issue #$ISSUE_N with cap-wait (resets $RESET_ISO)"

      - name: Trigger code review for any new PR
        if: steps.claude.outcome == 'success' && (steps.validate.outcome == 'success' || steps.validate.outcome == 'skipped')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          PROMPT: ${{ github.event.inputs.prompt || '' }}
        run: |
          if echo "$PROMPT" | grep -qF "You are a code reviewer"; then
            exit 0
          fi
          ISSUE_N=$(echo "$PROMPT" | grep -oP 'Issue #\K[0-9]+' | head -1 || true)
          [ -z "$ISSUE_N" ] && ISSUE_N=$(echo "$PROMPT" | grep -oP 'orchestrator-strata-reports#\K[0-9]+' | head -1 || true)
          PR_DATA=""
          if [ -n "$ISSUE_N" ]; then
            PR_DATA=$(gh pr list --base main --state open \
              --json number,headRefName,labels \
              --jq "[.[] | select(
                .headRefName == \"feature/issue-${ISSUE_N}\" and
                (.labels | map(.name) | any(startswith(\"review-retry-\") or . == \"needs-human-review\") | not)
              )] | first // empty")
          fi
          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            PR_DATA=$(gh pr list --base main --state open \
              --json number,headRefName,labels \
              --jq '[.[] | select(
                (.headRefName | startswith("feature/issue-")) and
                (.labels | map(.name) | any(startswith("review-retry-") or . == "needs-human-review") | not)
              )] | first // empty')
          fi
          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            echo "No open feature PRs awaiting review — skipping"
            exit 0
          fi
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
          HEAD_BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')
          PR_ISSUE_N=$(echo "$HEAD_BRANCH" | grep -oP 'feature/issue-\K[0-9]+' || true)
          if [ -n "$PR_ISSUE_N" ]; then
            ISSUE_LABELS=$(GH_TOKEN="$GH_DISPATCH_TOKEN" gh issue view "$PR_ISSUE_N" \
              --repo strata-reports-ai/orchestrator-strata-reports \
              --json labels --jq '[.labels[].name]' 2>/dev/null || echo "[]")
            if echo "$ISSUE_LABELS" | grep -q '"code-review"'; then
              echo "Issue #$PR_ISSUE_N already in code-review — skipping"
              exit 0
            fi
          fi
          echo "Dispatching code review for PR #$PR_NUMBER"
          export PR_NUMBER HEAD_BRANCH
          bash scripts/trigger-review.sh
